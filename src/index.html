<!DOCTYPE html><html lang="en" data-theme="dollar-light"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Value Metrics</title>
  <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/styles.css"></head>
    
  <body>
    <!-- Root /index.html is autogenerated by ./scripts/build.mjs from /src/index.html; do not edit /index.html directly. -->
    <div id="app"></div>
    <!-- COMPANY_NAME_SLUG is autogenerated by ./scripts/build.mjs from /company-metrics; do not edit directly. -->
    <script id="company-name-slug-data">
      const COMPANY_NAME_SLUG = __COMPANY_NAME_SLUG__
      window.COMPANY_NAME_SLUG = COMPANY_NAME_SLUG
    </script>

    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact",
          "preact/hooks": "https://esm.sh/preact/hooks",
          "htm": "https://esm.sh/htm"
        }
      }
    </script>

    <script type="module" id="app-module">
      import { h, hydrate } from 'preact'
      import { useState } from 'preact/hooks'
      import htm from 'htm'

      const html = htm.bind(h)
      const LIGHT_THEME = 'dollar-light'
      const DARK_THEME = 'dollar-dark'
      const DEFAULT_COMPANY_SLUG = 'chime'
      const DEFAULT_COMPANY_NAME = 'Chime'
      const COMPANY_OPTIONS = (() => {
        const globalOptions = Array.isArray(globalThis.COMPANY_NAME_SLUG) ? globalThis.COMPANY_NAME_SLUG : []
        const normalizedOptions = globalOptions
          .map((entry) => {
            if (!entry || typeof entry !== 'object') return null
            const slug = typeof entry.slug === 'string' ? entry.slug.trim().toLowerCase() : ''
            if (!/^[a-z0-9-]+$/.test(slug)) return null
            const name = typeof entry.name === 'string' && entry.name.trim().length > 0 ? entry.name.trim() : slug
            return { name, slug }
          })
          .filter(Boolean)
        if (normalizedOptions.some(({ slug }) => slug === DEFAULT_COMPANY_SLUG)) return normalizedOptions
        return [{ name: DEFAULT_COMPANY_NAME, slug: DEFAULT_COMPANY_SLUG }, ...normalizedOptions]
      })()

      if (typeof document !== 'undefined') {
        document.documentElement.setAttribute('data-theme', LIGHT_THEME)
      }

      const currencyFormatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 })
      const percentFormatter = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      const numberFormatter = new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 })

      function formatValue(key, value) {
        if (value === null || value === undefined) return 'N/A'
        if (key === 'revenue' || key === 'marketCap' || key === 'valuation') return currencyFormatter.format(value)
        if (key.endsWith('Pct')) return `${percentFormatter.format(value)}%`
        return numberFormatter.format(value)
      }

      function getBaseUrl() {
        return typeof document === 'undefined' ? 'http://localhost:3000' : ''
      }

      function normalizeCompanySlug(value) {
        if (typeof value !== 'string') return ''
        const normalized = value.trim().toLowerCase()
        return /^[a-z0-9-]+$/.test(normalized) ? normalized : ''
      }

      function getKnownCompanySlug(value) {
        const normalizedSlug = normalizeCompanySlug(value)
        if (!normalizedSlug) return DEFAULT_COMPANY_SLUG
        if (COMPANY_OPTIONS.some(({ slug }) => slug === normalizedSlug)) return normalizedSlug
        return DEFAULT_COMPANY_SLUG
      }

      function readUrlParams() {
        if (typeof window === 'undefined') return { company: DEFAULT_COMPANY_SLUG }
        const searchParams = new URLSearchParams(window.location.search)
        const company = getKnownCompanySlug(searchParams.get('company'))
        return { company }
      }

      function writeUrlParams(nextParams) {
        if (typeof window === 'undefined') return
        const searchParams = new URLSearchParams(window.location.search)
        Object.entries(nextParams).forEach(([key, value]) => {
          if (value === null || value === undefined || value === '') {
            searchParams.delete(key)
            return
          }
          searchParams.set(key, String(value))
        })
        const nextSearch = searchParams.toString()
        const nextUrl = `${window.location.pathname}${nextSearch ? `?${nextSearch}` : ''}${window.location.hash}`
        window.history.replaceState({}, '', nextUrl)
      }

      async function loadCompanyPayload(companySlug = DEFAULT_COMPANY_SLUG) {
        const safeCompanySlug = getKnownCompanySlug(companySlug)
        const metricsUrl = `${getBaseUrl()}/company-metrics/${safeCompanySlug}.json`
        try {
          const response = await fetch(metricsUrl)
          if (!response.ok) throw new Error(`Failed to load metrics: ${response.status}`)
          return response.json()
        } catch {
          return {}
        }
      }

      const initialUrlParams = readUrlParams()
      const companyPayload = await loadCompanyPayload(initialUrlParams.company)

      function CompanyPicker({
        options = [],
        value,
        onChange,
        disabled = false,
        showLabel = true,
        selectClassName = 'select select-ghost w-fit appearance-none flex-none rounded-none border-x-0 border-t-0 border-b-2 border-dotted border-base-content/50 bg-transparent px-0 pb-0 pr-7 text-3xl',
      }) {
        const labelClass = showLabel ? 'inline-flex w-fit items-center gap-2' : 'inline-flex w-fit items-center'
        return html`
          <label class=${labelClass}>
            ${showLabel ? html`<span class="text-sm font-medium text-gray-600">Company</span>` : null}
            <select
              class=${selectClassName}
              style=${{ fieldSizing: 'content' }}
              value=${value}
              onChange=${onChange}
              disabled=${disabled}
              aria-label="Company"
            >
              ${options.map(({ name, slug }) => html`
                <option value=${slug} key=${slug}>${name}</option>
              `)}
            </select>
          </label>
        `
      }

      function ThemePicker({ isLightTheme, onToggleTheme }) {
        const lightOptionClass = isLightTheme
          ? 'inline-flex h-7 w-7 items-center justify-center rounded-full transition bg-base-100 text-base-content shadow-sm ring-1 ring-base-content/15'
          : 'inline-flex h-7 w-7 items-center justify-center rounded-full transition text-base-content/70'
        const darkOptionClass = isLightTheme
          ? 'inline-flex h-7 w-7 items-center justify-center rounded-full transition text-base-content/70'
          : 'inline-flex h-7 w-7 items-center justify-center rounded-full transition bg-base-100 text-base-content shadow-sm ring-1 ring-base-content/15'

        return html`
          <button
            type="button"
            class="inline-flex items-center gap-1 rounded-full border border-base-content/15 bg-base-300/70 p-1"
            aria-label=${isLightTheme ? 'Switch to dark theme' : 'Switch to light theme'}
            title=${isLightTheme ? 'Switch to dark theme' : 'Switch to light theme'}
            onClick=${onToggleTheme}
          >
            <span class=${lightOptionClass}>
              <i class="fa-solid fa-sun"></i>
            </span>
            <span class=${darkOptionClass}>
              <i class="fa-solid fa-moon"></i>
            </span>
          </button>
        `
      }

      export function App({ company: initialCompany = {}, urlParams: initialUrlParams = { company: DEFAULT_COMPANY_SLUG } }) {
        const [company, setCompany] = useState(initialCompany)
        const [urlParams, setUrlParams] = useState(initialUrlParams)
        const [isLoadingCompany, setIsLoadingCompany] = useState(false)
        const selectedCompanySlug = getKnownCompanySlug(urlParams.company)
        const ticker = company.ticker ?? null
        const normalizedTicker = typeof ticker === 'string' ? ticker.trim() : ''
        const hasKnownTicker = normalizedTicker.length > 0 && normalizedTicker.toLowerCase() !== 'unknown'
        const isPublicCompany = hasKnownTicker
        const listingStatus = isPublicCompany ? 'Public' : 'Private'
        const fiscalYear = company.fiscalYear ?? 'N/A'
        const metadataParts = [`Fiscal Year ${fiscalYear}`]
        if (isPublicCompany) metadataParts.push(normalizedTicker)
        metadataParts.push(listingStatus)
        const metrics = company.metrics ?? {}
        const companyValueMetric = isPublicCompany ? ['marketCap', 'Market Cap'] : ['valuation', 'Valuation']
        const orderedMetrics = [
          companyValueMetric,
          ['revenue', 'Revenue'],
          ['revenueGrowthPct', 'Revenue Growth'],
          ['grossMarginPct', 'Gross Margin'],
          ['ebitdaMarginPct', 'EBITDA Margin'],
          ['employeeCount', 'Employee Count'],
        ]
        const [theme, setTheme] = useState(LIGHT_THEME)
        const isLightTheme = theme === LIGHT_THEME

        async function handleCompanyChange(event) {
          const nextCompanySlug = getKnownCompanySlug(event.currentTarget.value)
          const nextUrlParams = { ...urlParams, company: nextCompanySlug }
          setUrlParams(nextUrlParams)
          writeUrlParams(nextUrlParams)
          setIsLoadingCompany(true)
          const nextCompany = await loadCompanyPayload(nextCompanySlug)
          setCompany(nextCompany)
          setIsLoadingCompany(false)
        }

        function toggleTheme() {
          const nextTheme = isLightTheme ? DARK_THEME : LIGHT_THEME
          if (typeof document !== 'undefined') {
            document.documentElement.setAttribute('data-theme', nextTheme)
          }
          setTheme(nextTheme)
        }

        return html`
          <main class="mx-auto my-8 max-w-[720px] px-4 font-sans">
            <div class="mb-4 flex items-start justify-between gap-4">
              <h1 class="text-3xl font-semibold">Security Value</h1>
              <${ThemePicker} isLightTheme=${isLightTheme} onToggleTheme=${toggleTheme} />
            </div>
            <div class="mb-4">
              <div>
                <h2 class="mb-2 flex items-center gap-2 text-2xl font-semibold">
                  <${CompanyPicker}
                    options=${COMPANY_OPTIONS}
                    value=${selectedCompanySlug}
                    onChange=${handleCompanyChange}
                    disabled=${isLoadingCompany}
                    showLabel=${false}
                    selectClassName="select select-ghost w-fit appearance-none flex-none rounded-none border-x-0 border-t-0 border-b-2 border-dotted border-base-content/50 bg-transparent px-0 pb-0 pr-7 text-2xl"
                  />
                  <span>Metrics</span>
                </h2>
                <p class="text-sm text-gray-600">${metadataParts.join(' • ')}</p>
              </div>
            </div>
            <table class="w-full border-collapse">
              <thead>
                <tr>
                  <th class="border-b border-gray-300 py-2 text-left">Metric</th>
                  <th class="border-b border-gray-300 py-2 text-right">Value</th>
                </tr>
              </thead>
              <tbody>
                ${orderedMetrics.map(([key, label]) => html`
                  <tr key=${key}>
                    <td class="border-b border-gray-100 py-2">${label}</td>
                    <td class="border-b border-gray-100 py-2 text-right tabular-nums">${formatValue(key, metrics[key])}</td>
                  </tr>
                `)}
              </tbody>
            </table>
          </main>
        `
      }

      export const appProps = {
        company: companyPayload,
        urlParams: initialUrlParams,
      }

      export function renderApp() {
        return html`<${App} company=${appProps.company} urlParams=${appProps.urlParams} />`
      }

      if (typeof document !== 'undefined') {
        hydrate(renderApp(), document.getElementById('app'))
      }
    </script>


</body></html>
