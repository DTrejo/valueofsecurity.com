<!doctype html>
<html lang="en" data-theme="dollar-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Value Metrics</title>
    <link rel="stylesheet" href="/vendor/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <!-- Placeholder for SSR build output in /gh-pages/index.html, generated by ./scripts/build.mjs -->
    <div id="app"></div>
    <!-- COMPANY_NAME_SLUG is autogenerated by ./scripts/build.mjs from /company-metrics; do not edit directly. -->
    <script id="company-name-slug-data">
      const COMPANY_NAME_SLUG = __COMPANY_NAME_SLUG__
      window.COMPANY_NAME_SLUG = COMPANY_NAME_SLUG
    </script>

    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact",
          "preact/hooks": "https://esm.sh/preact/hooks",
          "htm": "https://esm.sh/htm"
        }
      }
    </script>

    <script type="module" id="app-module">
      import { h, hydrate } from 'preact'
      import { useState } from 'preact/hooks'
      import htm from 'htm'

      const html = htm.bind(h)
      const LIGHT_THEME = 'dollar-light'
      const DARK_THEME = 'dollar-dark'
      const EBITDA_MIN = -40
      const EBITDA_MAX = 40
      const EBITDA_STEP = 5
      const FRAGMENT_KEY_COMPANY = 'company'
      const FRAGMENT_KEY_EBITDA_MARGIN_PCT = 'ebitdaMarginPct'
      const FRAGMENT_KEY_INDUSTRY = 'industry'
      const APP_FRAGMENT_KEYS = [
        FRAGMENT_KEY_COMPANY,
        FRAGMENT_KEY_EBITDA_MARGIN_PCT,
        FRAGMENT_KEY_INDUSTRY,
      ]
      const DEFAULT_COMPANY_SLUG = 'chime'
      const DEFAULT_COMPANY_NAME = 'Chime'
      const DEFAULT_INDUSTRY = 'general'
      const COMPANY_DEFAULT_INDUSTRY = {
        chime: 'finance',
      }
      const INDUSTRY_OPTIONS = [
        { value: 'general', label: 'General' },
        { value: 'finance', label: 'Finance' },
        { value: 'healthcare', label: 'Healthcare' },
        { value: 'utilities', label: 'Utilities' },
        { value: 'government', label: 'Government' },
        { value: 'logistics', label: 'Logistics' },
        { value: 'manufacturing', label: 'Manufacturing' },
        { value: 'retail', label: 'Retail' },
      ]
      const INDUSTRY_VALUES = new Set(
        INDUSTRY_OPTIONS.map(({ value }) => value),
      )
      const COMPANY_OPTIONS = (() => {
        const globalOptions = Array.isArray(globalThis.COMPANY_NAME_SLUG)
          ? globalThis.COMPANY_NAME_SLUG
          : []
        const normalizedOptions = globalOptions
          .map((entry) => {
            if (!entry || typeof entry !== 'object') return null
            const slug =
              typeof entry.slug === 'string'
                ? entry.slug.trim().toLowerCase()
                : ''
            if (!/^[a-z0-9-]+$/.test(slug)) return null
            const name =
              typeof entry.name === 'string' && entry.name.trim().length > 0
                ? entry.name.trim()
                : slug
            return { name, slug }
          })
          .filter(Boolean)
        if (normalizedOptions.some(({ slug }) => slug === DEFAULT_COMPANY_SLUG))
          return normalizedOptions
        return [
          { name: DEFAULT_COMPANY_NAME, slug: DEFAULT_COMPANY_SLUG },
          ...normalizedOptions,
        ]
      })()

      if (typeof document !== 'undefined') {
        document.documentElement.setAttribute('data-theme', LIGHT_THEME)
      }

      const currencyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 0,
      })
      const compactCurrencyFormatter = new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        notation: 'compact',
        compactDisplay: 'short',
        maximumFractionDigits: 3,
      })
      const percentFormatter = new Intl.NumberFormat('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      })
      const numberFormatter = new Intl.NumberFormat('en-US', {
        maximumFractionDigits: 0,
      })

      const formatCurrency = (value) =>
        Math.abs(value) >= 1_000_000
          ? compactCurrencyFormatter.format(value)
          : currencyFormatter.format(value)

      const formatPercent = (value) => `${percentFormatter.format(value)}%`

      function getBaseUrl() {
        return typeof document === 'undefined' ? 'http://localhost:3000' : ''
      }

      function normalizeCompanySlug(value) {
        if (typeof value !== 'string') return ''
        const normalized = value.trim().toLowerCase()
        return /^[a-z0-9-]+$/.test(normalized) ? normalized : ''
      }

      function getKnownCompanySlug(value) {
        const normalizedSlug = normalizeCompanySlug(value)
        if (!normalizedSlug) return DEFAULT_COMPANY_SLUG
        if (COMPANY_OPTIONS.some(({ slug }) => slug === normalizedSlug))
          return normalizedSlug
        return DEFAULT_COMPANY_SLUG
      }

      function normalizeIndustry(value) {
        if (typeof value !== 'string') return ''
        return value.trim().toLowerCase()
      }

      function getKnownIndustry(value) {
        const normalizedIndustry = normalizeIndustry(value)
        if (!normalizedIndustry) return DEFAULT_INDUSTRY
        return INDUSTRY_VALUES.has(normalizedIndustry)
          ? normalizedIndustry
          : DEFAULT_INDUSTRY
      }

      function getDefaultIndustryForCompany(companySlug) {
        const normalizedCompanySlug = getKnownCompanySlug(companySlug)
        return getKnownIndustry(COMPANY_DEFAULT_INDUSTRY[normalizedCompanySlug])
      }

      function parseOptionalNumber(value) {
        if (value === null || value === undefined || value === '') return null
        const parsedValue = Number(value)
        return Number.isFinite(parsedValue) ? parsedValue : null
      }

      function clampNumber(value, min, max) {
        if (!Number.isFinite(value)) return min
        return Math.min(max, Math.max(min, value))
      }

      function readFragmentSearchParams() {
        if (typeof window === 'undefined') return new URLSearchParams()
        const rawHash = window.location.hash.startsWith('#')
          ? window.location.hash.slice(1)
          : window.location.hash
        return new URLSearchParams(rawHash)
      }

      function hasAppFragmentParams(fragmentParams) {
        return APP_FRAGMENT_KEYS.some((key) => fragmentParams.has(key))
      }

      function readFragmentParams() {
        if (typeof window === 'undefined')
          return {
            company: DEFAULT_COMPANY_SLUG,
            ebitdaMarginPct: null,
            industry: getDefaultIndustryForCompany(DEFAULT_COMPANY_SLUG),
          }
        const fragmentParams = readFragmentSearchParams()
        const activeParams = hasAppFragmentParams(fragmentParams)
          ? fragmentParams
          : new URLSearchParams()
        const company = getKnownCompanySlug(
          activeParams.get(FRAGMENT_KEY_COMPANY),
        )
        const ebitdaMarginPct = parseOptionalNumber(
          activeParams.get(FRAGMENT_KEY_EBITDA_MARGIN_PCT),
        )
        const rawIndustry = activeParams.get(FRAGMENT_KEY_INDUSTRY)
        const industry =
          rawIndustry === null
            ? getDefaultIndustryForCompany(company)
            : getKnownIndustry(rawIndustry)
        return { company, ebitdaMarginPct, industry }
      }

      function writeFragmentParams(nextParams, options = {}) {
        if (typeof window === 'undefined') return
        const { reset = false } = options
        const currentFragmentParams = readFragmentSearchParams()
        const fragmentParams =
          reset || !hasAppFragmentParams(currentFragmentParams)
            ? new URLSearchParams()
            : new URLSearchParams(currentFragmentParams)
        let effectiveCompanySlug = getKnownCompanySlug(
          fragmentParams.get(FRAGMENT_KEY_COMPANY),
        )
        if (
          Object.prototype.hasOwnProperty.call(nextParams, FRAGMENT_KEY_COMPANY)
        ) {
          effectiveCompanySlug = getKnownCompanySlug(
            nextParams[FRAGMENT_KEY_COMPANY],
          )
        }
        Object.entries(nextParams).forEach(([key, value]) => {
          if (value === null || value === undefined || value === '') {
            fragmentParams.delete(key)
            return
          }
          if (key === FRAGMENT_KEY_COMPANY) {
            const normalizedCompanySlug = getKnownCompanySlug(value)
            if (normalizedCompanySlug === DEFAULT_COMPANY_SLUG) {
              fragmentParams.delete(key)
              return
            }
            fragmentParams.set(key, normalizedCompanySlug)
            return
          }
          if (key === FRAGMENT_KEY_INDUSTRY) {
            const normalizedIndustry = getKnownIndustry(value)
            const defaultIndustry =
              getDefaultIndustryForCompany(effectiveCompanySlug)
            if (normalizedIndustry === defaultIndustry) {
              fragmentParams.delete(key)
              return
            }
            fragmentParams.set(key, normalizedIndustry)
            return
          }
          fragmentParams.set(key, String(value))
        })
        const nextHash = fragmentParams.toString()
        const nextUrl = `${window.location.pathname}${nextHash ? `#${nextHash}` : ''}`
        window.history.replaceState({}, '', nextUrl)
      }

      async function loadCompanyPayload(companySlug = DEFAULT_COMPANY_SLUG) {
        const safeCompanySlug = getKnownCompanySlug(companySlug)
        const metricsUrl = `${getBaseUrl()}/company-metrics/${safeCompanySlug}.json`
        try {
          const response = await fetch(metricsUrl)
          if (!response.ok)
            throw new Error(`Failed to load metrics: ${response.status}`)
          return response.json()
        } catch {
          return {}
        }
      }

      async function copyTextToClipboard(text) {
        if (typeof text !== 'string' || text.length === 0) return
        if (typeof navigator === 'undefined' || !navigator.clipboard?.writeText)
          throw new Error('Clipboard API unavailable')
        await navigator.clipboard.writeText(text)
      }

      const initialFragmentParams = readFragmentParams()
      const companyPayload = await loadCompanyPayload(
        initialFragmentParams.company,
      )

      function CompanyPicker({
        options = [],
        value,
        onChange,
        disabled = false,
        showLabel = true,
        selectClassName = 'select select-ghost w-fit appearance-none flex-none rounded-none border-x-0 border-t-0 border-b-2 border-dotted border-base-content/50 bg-transparent px-0 pb-0 pr-7 text-3xl',
      }) {
        const labelClass = showLabel
          ? 'inline-flex w-fit items-center gap-2'
          : 'inline-flex w-fit items-center'
        return html`
          <label class=${labelClass}>
            ${showLabel
              ? html`<span class="text-sm font-medium text-gray-600"
                  >Company</span
                >`
              : null}
            <select
              class=${selectClassName}
              style=${{ fieldSizing: 'content' }}
              value=${value}
              onChange=${onChange}
              disabled=${disabled}
              aria-label="Company"
            >
              ${options.map(
                ({ name, slug }) => html`
                  <option value=${slug} key=${slug}>${name}</option>
                `,
              )}
            </select>
          </label>
        `
      }

      function ThemePicker({ isLightTheme, onToggleTheme }) {
        const lightOptionClass = isLightTheme
          ? 'inline-flex h-7 w-7 items-center justify-center rounded-full transition bg-base-100 text-base-content shadow-sm ring-1 ring-base-content/15'
          : 'inline-flex h-7 w-7 items-center justify-center rounded-full transition text-base-content/70'
        const darkOptionClass = isLightTheme
          ? 'inline-flex h-7 w-7 items-center justify-center rounded-full transition text-base-content/70'
          : 'inline-flex h-7 w-7 items-center justify-center rounded-full transition bg-base-100 text-base-content shadow-sm ring-1 ring-base-content/15'

        return html`
          <button
            type="button"
            class="inline-flex items-center gap-1 rounded-full border border-base-content/15 bg-base-300/70 p-1"
            aria-label=${isLightTheme
              ? 'Switch to dark theme'
              : 'Switch to light theme'}
            title=${isLightTheme
              ? 'Switch to dark theme'
              : 'Switch to light theme'}
            onClick=${onToggleTheme}
          >
            <span class=${lightOptionClass}>
              <i class="fa-solid fa-sun"></i>
            </span>
            <span class=${darkOptionClass}>
              <i class="fa-solid fa-moon"></i>
            </span>
          </button>
        `
      }

      function CopyUrlButton({ url, onCopyResult }) {
        async function handleCopyUrl() {
          try {
            await copyTextToClipboard(url)
            onCopyResult?.({ status: 'success', message: 'URL copied' })
          } catch {
            onCopyResult?.({
              status: 'error',
              message: 'Could not copy URL',
            })
          }
        }

        return html`
          <button
            type="button"
            class="btn btn-ghost btn-sm gap-2 normal-case"
            onClick=${handleCopyUrl}
            aria-label="Copy URL"
            title="Copy URL"
          >
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
            <span>Copy URL</span>
          </button>
        `
      }

      function CopyMarkdownButton({ onCopyResult }) {
        async function handleCopyMarkdown() {
          const pageText =
            typeof window !== 'undefined' &&
            typeof window.main?.textContent === 'string'
              ? window.main.textContent
              : typeof document !== 'undefined'
                ? (document.body?.textContent ?? '')
                : ''
          try {
            await copyTextToClipboard(pageText.trim())
            onCopyResult?.({
              status: 'success',
              message: 'Page markdown copied',
            })
          } catch {
            onCopyResult?.({
              status: 'error',
              message: 'Could not copy markdown',
            })
          }
        }

        return html`
          <button
            type="button"
            class="btn btn-ghost btn-sm gap-2 normal-case"
            onClick=${handleCopyMarkdown}
            aria-label="Copy Markdown"
            title="Copy Markdown"
          >
            <i class="fa-solid fa-clipboard"></i>
            <span>Copy Markdown</span>
          </button>
        `
      }

      function SliderNumberInput({
        value,
        onChange,
        min,
        max,
        step = 1,
        minOffset = null,
        maxOffset = null,
      }) {
        const safeValue = Number.isFinite(value) ? value : 0
        const resolvedMin = Number.isFinite(min)
          ? min
          : safeValue + (Number.isFinite(minOffset) ? minOffset : -100)
        const resolvedMax = Number.isFinite(max)
          ? max
          : safeValue + (Number.isFinite(maxOffset) ? maxOffset : 100)
        const boundedValue = clampNumber(safeValue, resolvedMin, resolvedMax)
        const longestInputValueLength = Math.max(
          String(resolvedMin).length,
          String(resolvedMax).length,
        )
        const inputWidth = `${longestInputValueLength}ch`

        function handleRangeInput(event) {
          const nextValue = parseOptionalNumber(event.currentTarget.value)
          if (!Number.isFinite(nextValue)) return
          onChange(clampNumber(nextValue, resolvedMin, resolvedMax))
        }

        function handleNumberChange(event) {
          const nextValue = parseOptionalNumber(event.currentTarget.value)
          if (!Number.isFinite(nextValue)) return
          onChange(clampNumber(nextValue, resolvedMin, resolvedMax))
        }

        return html`
          <div
            class="grid w-full min-w-0 grid-cols-[minmax(0,1fr)_auto] items-center gap-2 sm:gap-3"
          >
            <input
              type="range"
              class="range range-xs [--range-fill:0] w-full min-w-0 sm:max-w-40"
              min=${resolvedMin}
              max=${resolvedMax}
              step=${step}
              value=${boundedValue}
              onInput=${handleRangeInput}
              aria-label="EBITDA margin slider"
            />
            <input
              type="number"
              class="shrink-0 rounded-none border-x-0 border-t-0 border-b-2 border-dotted border-base-content/50 bg-transparent px-0 text-lg text-right tabular-nums [appearance:textfield] outline-none focus:outline-none focus:ring-0"
              style=${{
                width: inputWidth,
                fontVariantNumeric: 'tabular-nums',
              }}
              min=${resolvedMin}
              max=${resolvedMax}
              step=${step}
              value=${boundedValue}
              onChange=${handleNumberChange}
              aria-label="EBITDA margin input"
            />
          </div>
        `
      }

      function IndustryPicker({ value, onChange, options = INDUSTRY_OPTIONS }) {
        return html`
          <fieldset class="mb-3">
            <legend class="mb-2 text-sm font-medium text-gray-600">
              Industry
            </legend>
            <div class="flex flex-wrap gap-2">
              ${options.map(
                ({ value: optionValue, label }) => html`
                  <label
                    key=${optionValue}
                    class="cursor-pointer"
                    title=${label}
                    aria-label=${label}
                  >
                    <input
                      type="radio"
                      class="peer sr-only"
                      name="industry"
                      value=${optionValue}
                      checked=${value === optionValue}
                      onChange=${() => onChange(optionValue)}
                    />
                    <span
                      class="inline-flex items-center rounded-full border border-base-content/20 px-3 py-1 text-sm transition peer-checked:border-base-content peer-checked:bg-base-content peer-checked:text-base-100"
                      >${label}</span
                    >
                  </label>
                `,
              )}
            </div>
          </fieldset>
        `
      }

      function arrowBody(arrowFn) {
        const needle = '=>'
        const source = arrowFn.toString()
        return source
          .slice(source.indexOf(needle) + needle.length)
          .trim()
          .replaceAll('\n', ' ')
      }

      function renderFormula(arrowFn) {
        return `${arrowFn.name} = ${arrowBody(arrowFn)}`
      }

      function memberValueScenario(revenue) {
        const memberValueMin = (revenue) => revenue * 3
        const memberValueMax = (revenue) => revenue * 20
        const memberValueMinValue = memberValueMin(revenue)
        const memberValueMaxValue = memberValueMax(revenue)
        return {
          formula: 'memberValue = revenue × [3, 20]',
          memberValueMin: memberValueMinValue,
          memberValueMax: memberValueMaxValue,
          calculationLines: [
            renderFormula(memberValueMin)
              .replaceAll('revenue', formatCurrency(revenue))
              .replaceAll(
                memberValueMin.name,
                formatCurrency(memberValueMinValue),
              ),
            renderFormula(memberValueMax)
              .replaceAll('revenue', formatCurrency(revenue))
              .replaceAll(
                memberValueMax.name,
                formatCurrency(memberValueMaxValue),
              ),
          ],
        }
      }

      function ransomScenario({ industry = 'general', revenue }) {
        const normalizedIndustry = getKnownIndustry(industry)

        // Base % by revenue band (inspired by mapping doc)
        let baseByRevenueBandPct
        if (revenue > 5_000_000_000)
          baseByRevenueBandPct = 0.007 // 0.7%
        else if (revenue >= 1_000_000_000)
          baseByRevenueBandPct = 0.005 // 0.5%
        else if (revenue >= 250_000_000)
          baseByRevenueBandPct = 0.0075 // 0.75%
        else if (revenue >= 50_000_000)
          baseByRevenueBandPct = 0.01 // 1.0%
        else baseByRevenueBandPct = 0.015 // 1.5%

        // Critical industries tend to face higher demands
        const industryMultiplier =
          {
            healthcare: 1.35,
            finance: 1.3,
            utilities: 1.25,
            government: 1.2,
            logistics: 1.15,
            manufacturing: 1.0,
            retail: 0.95,
            general: 1.0,
          }[normalizedIndustry] ?? 1.0
        const ransomValue = () =>
          revenue * baseByRevenueBandPct * industryMultiplier
        return {
          formula: renderFormula(ransomValue),
          ransomValue: ransomValue(),
          baseByRevenueBandPct: baseByRevenueBandPct,
          industryMultiplier: industryMultiplier,
          calculationLines: [
            renderFormula(ransomValue)
              .replaceAll('revenue', formatCurrency(revenue))
              .replaceAll(
                'baseByRevenueBandPct',
                formatPercent(baseByRevenueBandPct),
              )
              .replaceAll('industryMultiplier', industryMultiplier)
              .replaceAll(ransomValue.name, formatCurrency(ransomValue())),
          ],
        }
      }

      function CalculatorSummary({ formula, lines }) {
        const [isExpanded, setIsExpanded] = useState(false)
        return html`
          <div class="mb-4">
            <button
              type="button"
              class="btn btn-ghost btn-xs gap-1 px-1"
              onClick=${() => setIsExpanded((expanded) => !expanded)}
              aria-expanded=${isExpanded}
              aria-label="Toggle formula details"
              title="Toggle formula details"
            >
              <i class="fa-solid fa-calculator"></i>
              <span>Show calculation</span>
            </button>
            ${isExpanded
              ? html`
                  <div
                    class="mt-2 rounded border border-base-content/20 bg-base-100/60 p-3 text-sm"
                  >
                    <p>
                      <code>${formula}</code>
                    </p>
                    <ul class="mt-2 list-disc pl-5">
                      ${lines.map(
                        (line) =>
                          html`<li key=${line} class="mb-1">${line}</li>`,
                      )}
                    </ul>
                  </div>
                `
              : null}
          </div>
        `
      }

      export function App({
        company: initialCompany = {},
        fragmentParams: initialFragmentParams = {
          company: DEFAULT_COMPANY_SLUG,
          ebitdaMarginPct: null,
          industry: getDefaultIndustryForCompany(DEFAULT_COMPANY_SLUG),
        },
      }) {
        const [company, setCompany] = useState(initialCompany)
        const [fragmentParams, setFragmentParams] = useState(
          initialFragmentParams,
        )
        const [isLoadingCompany, setIsLoadingCompany] = useState(false)
        const selectedCompanySlug = getKnownCompanySlug(fragmentParams.company)
        const ticker = company.ticker ?? null
        const normalizedTicker = typeof ticker === 'string' ? ticker.trim() : ''
        const hasKnownTicker =
          normalizedTicker.length > 0 &&
          normalizedTicker.toLowerCase() !== 'unknown'
        const isPublicCompany = hasKnownTicker
        const listingStatus = isPublicCompany ? 'Public' : 'Private'
        const fiscalYear = company.fiscalYear
        const metadataFiscalYear =
          typeof fiscalYear === 'string' && fiscalYear.trim().length > 0
            ? fiscalYear.trim()
            : `Fiscal Year ${fiscalYear ?? 'N/A'}`
        const metadataParts = [metadataFiscalYear]
        if (isPublicCompany) metadataParts.push(normalizedTicker)
        metadataParts.push(listingStatus)
        const metrics = company.metrics ?? {}
        const companyValueMetric = isPublicCompany
          ? ['marketCap', 'Market Cap']
          : ['valuation', 'Valuation']
        const revenue = parseOptionalNumber(metrics.revenue)
        const memberValue = memberValueScenario(revenue)
        const selectedIndustry = getKnownIndustry(fragmentParams.industry)
        const ransom = ransomScenario({
          industry: selectedIndustry,
          revenue,
        })
        const selectedIndustryLabel =
          INDUSTRY_OPTIONS.find(({ value }) => value === selectedIndustry)
            ?.label ?? 'General'
        const metricTooltipCopy = {
          marketCap:
            'Current public market value of equity (share price × shares outstanding).',
          valuation:
            'Estimated private company value based on the latest funding or analysis.',
          revenue: 'Total annual revenue for the selected fiscal year.',
          revenueGrowthPct: 'Year-over-year change in revenue.',
          grossMarginPct: 'Gross profit as a percentage of revenue.',
          ebitdaMarginPct: 'EBITDA as a percentage of revenue.',
          employeeCount: 'Approximate total number of employees.',
        }
        const orderedMetrics = [
          companyValueMetric,
          ['revenue', 'Revenue'],
          ['revenueGrowthPct', 'Revenue Growth'],
          ['grossMarginPct', 'Gross Margin'],
          ['ebitdaMarginPct', 'EBITDA Margin'],
          ['employeeCount', 'Employee Count'],
        ]
        const sourceEbitdaMargin = parseOptionalNumber(metrics.ebitdaMarginPct)
        const parsedFragmentEbitdaMargin = parseOptionalNumber(
          fragmentParams.ebitdaMarginPct,
        )
        const hasEditedEbitdaMargin = Number.isFinite(
          parsedFragmentEbitdaMargin,
        )
        const baseEbitdaMargin = Number.isFinite(sourceEbitdaMargin)
          ? sourceEbitdaMargin
          : 0
        const ebitdaMarginValue = clampNumber(
          hasEditedEbitdaMargin ? parsedFragmentEbitdaMargin : baseEbitdaMargin,
          EBITDA_MIN,
          EBITDA_MAX,
        )
        const [theme, setTheme] = useState(LIGHT_THEME)
        const [copyToast, setCopyToast] = useState(null)
        const isLightTheme = theme === LIGHT_THEME
        const isLocalhost =
          typeof window !== 'undefined' &&
          window.location.hostname === 'localhost'
        const shareUrl =
          typeof window !== 'undefined' ? window.location.href : ''

        async function handleCompanyChange(event) {
          const nextCompanySlug = getKnownCompanySlug(event.currentTarget.value)
          const nextFragmentParams = {
            company: nextCompanySlug,
            ebitdaMarginPct: null,
            industry: getDefaultIndustryForCompany(nextCompanySlug),
          }
          setFragmentParams(nextFragmentParams)
          writeFragmentParams(nextFragmentParams, { reset: true })
          setIsLoadingCompany(true)
          const nextCompany = await loadCompanyPayload(nextCompanySlug)
          setCompany(nextCompany)
          setIsLoadingCompany(false)
        }

        function handleEbitdaMarginChange(nextValue) {
          const boundedValue = clampNumber(nextValue, EBITDA_MIN, EBITDA_MAX)
          const nextFragmentParams = {
            ...fragmentParams,
            ebitdaMarginPct: boundedValue,
          }
          setFragmentParams(nextFragmentParams)
          writeFragmentParams(nextFragmentParams)
        }

        function handleIndustryChange(nextIndustry) {
          const normalizedIndustry = getKnownIndustry(nextIndustry)
          const nextFragmentParams = {
            ...fragmentParams,
            industry: normalizedIndustry,
          }
          setFragmentParams(nextFragmentParams)
          writeFragmentParams(nextFragmentParams)
        }

        function toggleTheme() {
          const nextTheme = isLightTheme ? DARK_THEME : LIGHT_THEME
          if (typeof document !== 'undefined') {
            document.documentElement.setAttribute('data-theme', nextTheme)
          }
          setTheme(nextTheme)
        }

        function handleCopyResult(result) {
          const status = result?.status === 'error' ? 'error' : 'success'
          const message =
            typeof result?.message === 'string' &&
            result.message.trim().length > 0
              ? result.message.trim()
              : 'Copied'
          const id = Date.now()
          setCopyToast({ id, status, message })
          if (typeof window === 'undefined') return
          window.setTimeout(() => {
            setCopyToast((currentToast) =>
              currentToast?.id === id ? null : currentToast,
            )
          }, 2200)
        }

        return html`
          <main
            id="main"
            class="mx-auto my-8 box-border max-w-[720px] px-1 font-sans"
          >
            <div class="mb-4 flex items-start justify-between gap-4">
              <h1 class="text-3xl font-semibold">
                <a href="/" class="text-inherit no-underline hover:underline"
                  >What is the value of security?</a
                >
              </h1>
              <div class="flex items-center gap-1">
                <${ThemePicker}
                  isLightTheme=${isLightTheme}
                  onToggleTheme=${toggleTheme}
                />
              </div>
            </div>
            <p class="mb-4">
              The disciplines of growth, marketing, and sales are well known for
              their focus on revenue. Security tends to be much more difficult
              to value quantitatively. This minisite aims to help with that, and
              we won't shy away from illuminating qualitative value either.
            </p>
            <p class="mb-4">
              Try picking a company preset, or enter in your own metrics and
              play with implications for your business.
            </p>
            <p class="mb-4 italic">
              Data does not leave your browser. Customizations are client-side
              only in the URL fragment, so you can share with others if you
              choose, or let your AI help you fill out the parameters.
            </p>
            <div class="mb-4">
              <div class="mb-2 flex items-center justify-end gap-1">
                <${CopyUrlButton}
                  url=${shareUrl}
                  onCopyResult=${handleCopyResult}
                />
                <${CopyMarkdownButton} onCopyResult=${handleCopyResult} />
              </div>
              <div>
                <h2 class="mb-2 flex items-center gap-2 text-2xl font-semibold">
                  <${CompanyPicker}
                    options=${COMPANY_OPTIONS}
                    value=${selectedCompanySlug}
                    onChange=${handleCompanyChange}
                    disabled=${isLoadingCompany}
                    showLabel=${false}
                    selectClassName="select select-ghost w-fit appearance-none flex-none rounded-none border-x-0 border-t-0 border-b-2 border-dotted border-base-content/50 bg-transparent px-0 pb-0 pr-7 text-2xl"
                  />
                  <span
                    >Metrics${hasEditedEbitdaMargin ? ' (edited)' : ''}</span
                  >
                </h2>
                <p class="text-sm text-gray-600">
                  ${metadataParts.join(' • ')}
                </p>
              </div>
            </div>
            <table class="w-full border-collapse">
              <thead>
                <tr>
                  <th class="border-b border-gray-300 py-2 text-left">
                    Metric
                  </th>
                  <th class="border-b border-gray-300 py-2 text-right">
                    Value
                  </th>
                </tr>
              </thead>
              <tbody>
                ${orderedMetrics.map(([key, label]) => {
                  const metricValue = metrics[key]
                  const formattedMetricValue =
                    metricValue === null || metricValue === undefined
                      ? 'N/A'
                      : key === 'revenue' ||
                          key === 'marketCap' ||
                          key === 'valuation'
                        ? formatCurrency(metricValue)
                        : key.endsWith('Pct')
                          ? formatPercent(metricValue)
                          : numberFormatter.format(metricValue)

                  return html`
                    <tr key=${key}>
                      <td class="border-b border-gray-100 py-2">
                        <span
                          class="tooltip tooltip-right block w-fit cursor-help"
                          data-tip=${metricTooltipCopy[key] ?? label}
                          tabindex="0"
                          >${label}</span
                        >
                      </td>
                      <td
                        class="border-b border-gray-100 py-2 ${key ===
                        'ebitdaMarginPct'
                          ? ''
                          : 'text-right tabular-nums'}"
                      >
                        ${key === 'ebitdaMarginPct'
                          ? html`<${SliderNumberInput}
                              value=${ebitdaMarginValue}
                              min=${EBITDA_MIN}
                              max=${EBITDA_MAX}
                              step=${EBITDA_STEP}
                              onChange=${handleEbitdaMarginChange}
                            />`
                          : formattedMetricValue}
                      </td>
                    </tr>
                  `
                })}
              </tbody>
            </table>
            <!-- <p class="mb-4">
              TODO: table of contents that links to each scenario
            </p> -->
            <h2 class="mb-2 mt-6 text-2xl font-semibold">
              Security Value Flows
            </h2>
            <h3 class="mb-1 text-xl font-semibold">Member Value</h3>
            <p class="mb-4">
              Let's assume member value is 3x-20x revenue, or<span> </span>
              ${formatCurrency(memberValue.memberValueMin)}-${formatCurrency(
                memberValue.memberValueMax,
              )}.
            </p>
            <${CalculatorSummary}
              formula=${memberValue.formula}
              lines=${memberValue.calculationLines}
            />
            <h3 class="mb-1 text-xl font-semibold">
              Ransom for business operation or all data
            </h3>
            <${IndustryPicker}
              value=${selectedIndustry}
              onChange=${handleIndustryChange}
            />
            <p class="mb-4">
              If hackers infiltrate your company, they may either encrypt all
              your data to halt operations, or exfiltrate sensitive data and
              threaten to leak it. A ransom as percentage of revenue might
              be<span> </span> ${ransom.baseByRevenueBandPct}, with a
              <span> </span>${selectedIndustryLabel}<span> </span>
              multiplier of ${ransom.industryMultiplier}, for an estimated
              demand of ${formatCurrency(ransom.ransomValue)}.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/ransom-vs-revenue.md"
                >Details</a
              >.
            </p>
            <${CalculatorSummary}
              formula=${ransom.formula}
              lines=${ransom.calculationLines}
            />
            <hr class="my-6 border-t border-dotted border-base-content/40" />
            <h2 class="mb-2 text-2xl font-semibold">
              WIP Value calculations, coming soon
            </h2>
            <h3 class="mb-1 text-xl font-semibold">Member data</h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/dark-web-sale-value.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">
              Vulnerabilities, such as root code execution (RCE)
            </h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/bug-bounty-rce-payout-vs-revenue.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">
              Government consent order (repeated security issues)
            </h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/consent-orders.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">
              Emotional and brand value
            </h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/trust-and-brand-vs-revenue.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">
              Founders sleep well at night
            </h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/founders-sleep-well-at-night.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">
              Security engineers per engineer
            </h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/engineers-vs-security-engineers.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">Cyber Insurance</h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/value-mappings/cyber-insurance.md"
                >Details</a
              >.
            </p>
            <h3 class="mb-1 text-xl font-semibold">Single security project</h3>
            <p class="mb-4">
              <em>Coming soon</em>.
              <a
                class="link ml-1"
                href="https://github.com/DTrejo/valueofsecurity.com/blob/main/docs/how-to-measure-anything-loss-exceedance-curve-risk-tolerance-curve.md"
                >Details</a
              >.
            </p>
            ${copyToast
              ? html`
                  <div class="toast toast-top toast-end z-50">
                    <div
                      class=${`alert ${
                        copyToast.status === 'error'
                          ? 'alert-error'
                          : 'alert-success'
                      }`}
                    >
                      <i
                        class=${`fa-solid ${
                          copyToast.status === 'error'
                            ? 'fa-circle-xmark'
                            : 'fa-circle-check'
                        }`}
                      ></i>
                      <span>${copyToast.message}</span>
                    </div>
                  </div>
                `
              : null}
            ${isLocalhost
              ? html`
                  <section
                    class="mt-10 border-t border-dotted border-base-content/40 pt-5"
                  >
                    <h2 class="mb-4 text-xl font-semibold">
                      Storybook (localhost only)
                    </h2>
                    <p class="text-sm text-base-content/70">
                      Nothing here for now.
                    </p>
                  </section>
                `
              : null}
          </main>
        `
      }

      export const appProps = {
        company: companyPayload,
        fragmentParams: initialFragmentParams,
      }

      export function renderApp() {
        return html`<${App}
          company=${appProps.company}
          fragmentParams=${appProps.fragmentParams}
        />`
      }

      if (typeof document !== 'undefined') {
        hydrate(renderApp(), document.getElementById('app'))
      }
    </script>
  </body>
</html>
