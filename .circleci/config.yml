version: 2.1

jobs:
  deploy-gh-pages:
    docker:
      - image: cimg/node:24.15
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build site
          command: npm run build
      - run:
          name: Deploy force-orphan commit to gh-pages
          command: |
            set -euo pipefail
            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is required to push to gh-pages"
              exit 1
            fi

            rm -rf /tmp/gh-pages-deploy
            mkdir -p /tmp/gh-pages-deploy
            cp -R gh-pages/. /tmp/gh-pages-deploy/

            cd /tmp/gh-pages-deploy
            git init
            git checkout -b gh-pages
            git config user.name "circleci"
            git config user.email "circleci@users.noreply.github.com"
            touch .nojekyll
            git add -A
            git commit -m "Deploy ${CIRCLE_SHA1}"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
            git push --force origin gh-pages

workflows:
  deploy:
    jobs:
      - deploy-gh-pages:
          filters:
            branches:
              only: main
